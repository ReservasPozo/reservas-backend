<!DOCTYPE html>
<html lang="es">
<head>
    <title>Test de Subida a Cloudinary</title>
</head>
<body>
    <h1>Probar añadir plato</h1>
    <form action="/api/carta" method="POST" enctype="multipart/form-data">
        <input type="text" name="nombre" placeholder="Nombre del plato" required><br><br>
        <input type="number" name="precio" placeholder="Precio" required><br><br>
        <input type="text" name="categoria" placeholder="Categoría" required><br><br>
        
        <label>Selecciona la foto de tu carpeta:</label>
        <input type="file" name="foto" accept="image/*" required><br><br>
        
        <button type="submit">Enviar a Cloudinary y MongoDB</button>
    </form>
</body>
</html>
